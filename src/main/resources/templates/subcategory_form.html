<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subcategory Form - e-Dastavej</title>
    <link rel="stylesheet" href="/built/bundle.css">
</head>
<body>
    <div class="container">
        <h2 th:text="${subcategory.id == null} ? 'Add New Subcategory' : 'Edit Subcategory'"></h2>
        <form th:action="@{/subcategories/save}" th:object="${subcategory}" method="post">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" required>
            </div>
            <div class="form-group">
                <label for="category">Category:</label>
                <select class="form-control" id="category" th:field="*{category.id}" required>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
    <script src="/built/bundle.js"></script>
</body>
</html>
