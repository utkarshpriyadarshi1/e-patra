<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload - e-Dastavej</title>
    <link rel="stylesheet" href="/built/bundle.css">
</head>
<body>
    <div class="container">
        <h2>File Upload</h2>
        <form action="/user/upload" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="file">Choose file:</label>
                <input type="file" class="form-control" id="file" name="file" required>
            </div>
            <div class="form-group">
                <label for="category">Category:</label>
                <select class="form-control" id="category" name="category">
                    <option value="">Select Category</option>
                    <!-- Categories will be populated here -->
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="subCategory">Sub Category:</label>
                <select class="form-control" id="subCategory" name="subCategory">
                    <option value="">Select Sub Category</option>
                    <!-- Sub Categories will be populated here -->
                    <option th:each="subCategory : ${subCategories}" th:value="${subCategory.id}" th:text="${subCategory.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="fileType">File Type:</label>
                <input type="text" class="form-control" id="fileType" name="fileType">
            </div>
            <div class="form-group">
                <label for="roles">Roles:</label>
                <select multiple class="form-control" id="roles" name="roles">
                    <!-- Roles will be populated here -->
                    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Upload</button>
        </form>
    </div>
    <script src="/built/bundle.js"></script>
</body>
</html>
