<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - e-Dastavej</title>
    <link rel="stylesheet" href="/built/bundle.css">
</head>
<body>
    <div class="container">
        <h2>Users</h2>
        <a href="/users/new" class="btn btn-primary">Add New User</a>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Roles</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td>
                        <span th:each="role : ${user.roles}" th:text="${role.name} + ', '"></span>
                    </td>
                    <td>
                        <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-secondary">Edit</a>
                        <a th:href="@{/users/delete/{id}(id=${user.id})}" class="btn btn-danger">Delete</a>
                        <a th:href="@{/users/assign-roles/{id}(id=${user.id})}" class="btn btn-info">Assign Roles</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="/built/bundle.js"></script>
</body>
</html>
